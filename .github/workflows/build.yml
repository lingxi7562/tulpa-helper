name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build
        run: npm run tauri build

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "NSIS installer not found"
            exit 1
          }
          $dir = "src-tauri/target/release/bundle/nsis"
          Compress-Archive -Path "$dir/*" -DestinationPath "tulpa-helper-windows-portable.zip"
          Write-Output "Portable ZIP created: tulpa-helper-windows-portable.zip"

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: tulpa-helper-windows-portable
          path: tulpa-helper-windows-portable.zip

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: tulpa-helper-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build
        run: npm run tauri build

      - name: Package portable tar.gz
        run: |
          cp src-tauri/target/release/tulpa-helper .
          tar czf tulpa-helper-linux-portable.tar.gz tulpa-helper
          ls -lh tulpa-helper-linux-portable.tar.gz

      - name: Upload portable tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: tulpa-helper-linux-portable
          path: tulpa-helper-linux-portable.tar.gz

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: tulpa-helper-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: tulpa-helper-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
