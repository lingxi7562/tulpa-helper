name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build
        run: npm run tauri build

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $exe = "src-tauri/target/release/tulpa-helper.exe"
          if (-not (Test-Path $exe)) { Write-Error "Binary not found: $exe"; exit 1 }
          Compress-Archive -Path $exe -DestinationPath tulpa-helper-windows.zip
          Write-Output "tulpa-helper-windows.zip ($((Get-Item tulpa-helper-windows.zip).Length) bytes)"

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: tulpa-helper-windows
          path: tulpa-helper-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build
        run: npm run tauri build

      - name: Package portable tar.gz
        run: |
          cp src-tauri/target/release/tulpa-helper .
          tar czf tulpa-helper-linux.tar.gz tulpa-helper
          ls -lh tulpa-helper-linux.tar.gz

      - name: Upload portable tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: tulpa-helper-linux
          path: tulpa-helper-linux.tar.gz
