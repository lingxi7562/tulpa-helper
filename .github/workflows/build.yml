name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build (Windows MSI)
        run: npm run tauri build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: tulpa-helper-windows
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: tulpa-helper-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build (Linux AppImage + DEB)
        run: npm run tauri build

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: tulpa-helper-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: tulpa-helper-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
